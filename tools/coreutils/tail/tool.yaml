name: tail
description: "Display the last lines of a file (default: 10 lines). Can follow file growth."
executable: tail
danger_level: safe
arguments:
  - name: file
    description: "File(s) to display"
    required: true
    positional: 0
  - name: lines
    description: "Number of lines to show (e.g. -5, -100)"
    flag: "-n"
    default: ""
  - name: follow
    description: "Output appended data as the file grows"
    flag: "-f"
    default: false
  - name: bytes
    description: "Number of bytes to show (e.g. -c200)"
    flag: "-c"
    default: ""
examples:
  - "tail -n 20 /var/log/syslog"
  - "tail -f /var/log/nginx/access.log"
  - "tail -c 500 script.py"
